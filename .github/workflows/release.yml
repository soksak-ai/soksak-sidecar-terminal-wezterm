# 릴리즈 — main 에서 수동 dispatch 시 다섯 플랫폼 타깃마다 사이드카 dist 아카이브를 빌드해
# owner-immutable GitHub Release 자산으로 올린다. 각 타깃은 그 타깃의 네이티브 러너에서
# 빌드하므로 크로스 링커가 필요 없다. 버전/태그는 소유 manifest(Cargo.toml)에서 유도하고
# release/unit.json 과의 일치를 build-release 가 판정한다.
# publish 는 매트릭스 전체를 내려받아 소유 릴리즈 manifest(release.json)와 conformance 리포트
# 3종을 합성하고, 핀된 공개 soksak-spec 검증기로 판정한 뒤에만 자산으로 올린다 — 서명 레지스트리
# 인덱스가 릴리즈를 실을 수 있는 것은 이 manifest 뿐이다.
# 소비측(플러그인 manifest sidecars[].reach.fetch.url[platform] + sha256[platform])이 자산을 집는다.
name: release

on:
  workflow_dispatch:

concurrency:
  group: release-${{ github.repository }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build:
    if: github.ref == 'refs/heads/main'
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-15
          - target: x86_64-apple-darwin
            runner: macos-15-intel
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-24.04
          - target: x86_64-pc-windows-msvc
            runner: windows-2025
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
        with:
          toolchain: "1.96.0"
          targets: ${{ matrix.target }}
      - id: identity
        shell: bash
        run: |
          ver="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -1)"
          case "$ver" in ''|*[!0-9.]*) echo "invalid version: $ver" >&2; exit 1;; esac
          echo "version=$ver" >> "$GITHUB_OUTPUT"
      - name: Build and stage the release binary for this target
        shell: bash
        run: ./stage.sh dist "${{ matrix.target }}"
      - id: archive
        shell: bash
        run: |
          ver="${{ steps.identity.outputs.version }}"
          out="soksak-sidecar-terminal-wezterm-$ver-${{ matrix.target }}.tar.gz"
          tar -czf "$out" -C dist .
          # sha256 도구는 러너마다 다르다 — macOS 는 shasum(perl), linux·windows(git-bash)
          # 는 sha256sum(coreutils). 둘 다 "<hex>  <file>" 형식으로 동일하다.
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "$out" | tee "$out.sha256"
          else
            shasum -a 256 "$out" | tee "$out.sha256"
          fi
          echo "asset=$out" >> "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: dist-${{ matrix.target }}
          path: |
            ${{ steps.archive.outputs.asset }}
            ${{ steps.archive.outputs.asset }}.sha256
          if-no-files-found: error
          compression-level: 0

  publish:
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "22.12.0"
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1
        with:
          version: "10.30.3"
      - id: identity
        run: |
          ver="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -1)"
          case "$ver" in ''|*[!0-9.]*) echo "invalid version: $ver" >&2; exit 1;; esac
          echo "tag=v$ver" >> "$GITHUB_OUTPUT"
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          pattern: dist-*
          path: dist
          merge-multiple: true
      - run: node scripts/build-release.mjs --commit "${{ github.sha }}" --tag "${{ steps.identity.outputs.tag }}" --artifacts dist --out dist-release
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          repository: soksak-ai/soksak-spec
          ref: d7f54852754195527f125d1fc11362316157d19b
          path: .dependency/soksak-spec
      - name: Build the exact public validator without links
        working-directory: .dependency/soksak-spec
        run: |
          pnpm --config.node-linker=hoisted --config.symlink=false install --frozen-lockfile
          pnpm build
          test -z "$(find . -type l -print -quit)"
      - run: node scripts/validate-with-spec.mjs --spec-root .dependency/soksak-spec --release-dir dist-release
      - name: Create least-privilege release token
        id: release-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1
        with:
          client-id: ${{ vars.SOKSAK_RELEASE_CLIENT_ID }}
          private-key: ${{ secrets.SOKSAK_RELEASE_PRIVATE_KEY }}
          permission-administration: read
          permission-contents: write
      - name: Publish through owner-enforced immutable releases
        env:
          GH_TOKEN: ${{ steps.release-token.outputs.token }}
        run: |
          enforced="$(gh api "repos/${{ github.repository }}/immutable-releases" --jq '.enabled and .enforced_by_owner')"
          test "$enforced" = "true" || { echo "owner-enforced immutable releases must be enabled before tagging" >&2; exit 1; }
          tag="${{ steps.identity.outputs.tag }}"
          assets="$(find dist dist-release -type f \( -name '*.tar.gz' -o -name '*.sha256' -o -name '*.json' \) | sort)"
          test "$(printf '%s\n' "$assets" | grep -c '\.tar\.gz$')" -eq 5 || { echo "expected 5 platform archives, got:" >&2; echo "$assets" >&2; exit 1; }
          test "$(printf '%s\n' "$assets" | grep -c '\.tar\.gz\.sha256$')" -eq 5 || { echo "expected 5 archive checksums, got:" >&2; echo "$assets" >&2; exit 1; }
          test "$(printf '%s\n' "$assets" | grep -c '/release\.json$')" -eq 1 || { echo "expected the owner release manifest, got:" >&2; echo "$assets" >&2; exit 1; }
          test "$(printf '%s\n' "$assets" | grep -c '/conformance-[a-z]*\.json$')" -eq 3 || { echo "expected 3 conformance reports, got:" >&2; echo "$assets" >&2; exit 1; }
          gh release create "$tag" --repo "${{ github.repository }}" --target "${{ github.sha }}" --title "$tag" --generate-notes $assets
